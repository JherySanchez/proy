# ===============================
# CONFIGURACIÓN DEL TICKET-SERVICE
# ===============================

# Nombre lógico del servicio para la arquitectura distribuida
spring.application.name=ticket-service

# Puerto fijo del servicio (Como pide el ejemplo del PDF)
server.port=8081

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (Simulando db-node-primary)
# ===============================
spring.datasource.url=jdbc:h2:mem:ticketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creará las tablas automáticamente basándose en la clase Ticket.java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Habilitar la consola de H2 para ver nuestra base de datos en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
